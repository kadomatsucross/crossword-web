<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>クロスワード</title>

  <link rel="stylesheet" href="style.css">
</head>

<body data-page="puzzle">
  <main class="page-shell puzzle-page">
    <a
      id="backToSearchLink"
      class="back-link"
      href="search.html?mode=all"
    >
      一覧に戻る
    </a>

    <h1 id="puzzleTitle"></h1>

    <section class="active-clue-section">
      <div id="activeClueDisplay" class="active-clue-display">
        マスまたはカギを選択してください
      </div>
    </section>

    <div id="normalGameLayout">
      <section id="normalBoardPanel">
        <div id="crossword"></div>

        <section id="keywordPanel" class="keyword-panel">
          <div id="finalWordArea"></div>
        </section>

        <div class="buttons">
          <button id="checkButton" type="button">
            答え合わせ
          </button>

          <button id="resetButton" type="button">
            リセット
          </button>
        </div>

        <p id="message"></p>
      </section>

      <aside id="normalSidePanel">
        <section
          id="keyboardPanel"
          class="keyboard-panel hidden"
          aria-label="文字入力キーボード"
        >
          <div class="keyboard-panel-header">
            <strong>文字入力</strong>

            <button
              id="closeKeyboardButton"
              class="close-keyboard-button"
              type="button"
            >
              閉じる
            </button>
          </div>

          <div class="keyboard-mode-area">
            <span>入力方法</span>

            <button id="flickModeButton" type="button">
              フリック
            </button>

            <button id="gridModeButton" type="button">
              50音
            </button>
          </div>

          <div id="customKeyboard" class="custom-keyboard"></div>
        </section>
      </aside>
    </div>

    <section class="hints" id="hintsBox">
      <h2>ヒント</h2>

      <div class="hint-columns">
        <section>
          <h3>ヨコのカギ</h3>
          <ul id="acrossHints"></ul>
        </section>

        <section>
          <h3>タテのカギ</h3>
          <ul id="downHints"></ul>
        </section>
      </div>
    </section>

    <section class="user-memo-box">
      <div class="user-memo-header">
        <h2>メモ</h2>

        <button id="clearMemoButton" type="button">
          消去
        </button>
      </div>

      <textarea
        id="userMemo"
        class="user-memo"
        placeholder="候補の言葉や気づいたことを自由に書けます。"
      ></textarea>

      <p id="memoSaveStatus" class="memo-save-status"></p>
    </section>
  </main>

  <!-- 問題データ。問題を増やすたびに追加 -->
  <script src="puzzles/1.small/00001summer-3x3-1.js"></script>
  <script src="puzzles/1.small/00002birthday-5x5-1.js"></script>

  <!-- タイプ別処理 -->
  <script src="scripts/normal.js"></script>
  <script src="scripts/gimmick.js"></script>
  <script src="scripts/cube.js"></script>

  <!-- 共通処理 -->
  <script src="scripts/main.js"></script>
</body>
</html>
